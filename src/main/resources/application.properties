spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

spring.data.rest.base-path=/api

# JWT Configuration
app.jwtSecret=${JWT_SECRET_KEY:mySecretKeyForJWTTokenGenerationAndValidation12345678}
app.jwtExpirationMs=86400000

# Stripe Configuration
stripe.api.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.api.publishable-key=${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
