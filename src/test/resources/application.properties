spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.data.rest.base-path=/api

# JWT Configuration - use long enough secret for HS512 (min 64 chars)
app.jwtSecret=mySecretKeyForJWTTokenGenerationAndValidation12345678901234567890abcde
app.jwtExpirationMs=86400000

# Stripe Configuration - use empty placeholders for tests
stripe.api.secret-key=sk_test_placeholder
stripe.api.publishable-key=pk_test_placeholder
